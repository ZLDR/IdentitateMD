name: Publish Logos to npm

on:
  push:
    branches: [master]
    paths:
      - 'packages/logos/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      published: ${{ steps.publish.outputs.published }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Get package version
        id: version
        run: echo "version=$(node -p "require('./packages/logos/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: check
        run: |
          if npm view @identitate-md/logos@${{ steps.version.outputs.version }} version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} already on npm, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        id: publish
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/logos
        run: |
          npm publish --access public
          echo "published=true" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Trigger website redeploy
        if: steps.publish.outputs.published == 'true'
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
